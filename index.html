<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InkLoop · AI 标注阅读</title>
</head>
<body>
  <header id="topbar">
    <div class="brand">InkLoop</div>
    <div class="doc-meta">
      <span id="doc-name">未打开文档</span>
      <span id="page-ind"></span>
    </div>
    <div class="top-ctl">
      <button id="prev" class="ghost" title="上一页 ←">‹</button>
      <button id="next" class="ghost" title="下一页 →">›</button>
      <span class="vsep"></span>
      <button id="zoom-out" class="ghost" title="缩小">−</button>
      <span id="zoom-ind" class="zoom-ind">100%</span>
      <button id="zoom-in" class="ghost" title="放大">＋</button>
      <span class="vsep"></span>
      <label for="file-in" class="ghost import-label">导入 PDF</label>
      <input type="file" id="file-in" accept="application/pdf" hidden />
      <button id="view-toggle" class="ghost" title="原版 PDF ⇄ 重排阅读">重排</button>
      <button id="insight-toggle" class="ghost" title="本页洞察">洞察</button>
      <button id="dev-toggle" class="ghost" title="开发面板（d）">⋯</button>
    </div>
  </header>

  <main>
    <section id="reading">
      <div id="stage-wrap">
        <div id="stage">
          <canvas id="page-layer"></canvas>
          <canvas id="ink-layer"></canvas>
          <div id="whisper-layer"></div>
          <div id="empty-state">
            <div class="es-mark">✎</div>
            <p class="es-title">把 PDF 拖到这里，或点击导入</p>
            <p class="es-sub">在原文上圈、划、写 —— 每一次标注，都是一次思考的起点</p>
            <label for="file-in" class="primary-btn">导入 PDF</label>
          </div>
        </div>
      </div>
      <div id="reader" hidden></div>
      <nav id="toolbar" aria-label="标注工具"></nav>
    </section>

    <aside id="insight">
      <div class="panel-head">
        <span class="panel-title">本页洞察</span>
        <span id="insight-count" class="panel-count"></span>
      </div>
      <div id="cards"><p class="empty-hint">标注后，洞察会先在原文旁低语，并在此留存回看</p></div>
      <div id="panel-foot"></div>
    </aside>
  </main>

  <aside id="dev-drawer" hidden>
    <div class="drawer-head">
      <span>开发面板</span>
      <button id="drawer-close" class="ghost">✕</button>
    </div>
    <div class="drawer-section">
      <label>AI 行为（可独立开关、可组合）</label>
      <div class="set-row">
        <span>输出落点</span>
        <select id="set-placement">
          <option value="margin">右侧留白</option>
          <option value="inline">贴正文浮动</option>
        </select>
      </div>
      <div class="set-row">
        <span>重排引擎</span>
        <select id="set-reflow">
          <option value="local">仅启发式</option>
          <option value="hybrid">启发式 + 模型精修（文字）</option>
          <option value="vision">启发式 + 视觉重排（看图）</option>
          <option value="rewrite">VLM 看图重写（治网页截图 / 扭曲页）</option>
        </select>
      </div>
      <label class="set-check">
        <input type="checkbox" id="set-gesture" />
        <span>手势响应（段落讨论：圈=解释·划=重点·圈+问号=提问·写字=批注）</span>
      </label>
      <label class="set-check">
        <span>停笔</span>
        <input type="number" id="set-pause-sec" class="sec-in" min="1" max="30" step="1" /><span class="sec-u">秒后生成（同段原地更新）</span>
      </label>
    </div>
    <div class="drawer-section">
      <label>文字识别（OCR）</label>
      <label class="set-check">
        <input type="checkbox" id="set-textlayer" />
        <span>PDF 文本层（数字版精确·0 成本；图片型 PDF 无效）</span>
      </label>
      <div class="set-row">
        <span>图像 OCR</span>
        <select id="set-ocr-image">
          <option value="off">关闭</option>
          <option value="region">局部图（裁标注区域）</option>
          <option value="page">整页图（看全页）</option>
        </select>
      </div>
      <label>推理 provider</label>
      <select id="infer-provider"></select>
    </div>
    <div class="drawer-section">
      <label>预处理（导入后台跑 · 默认关）</label>
      <label class="set-check">
        <input type="checkbox" id="set-pp-reflow-on" />
        <span>预排版 前</span>
        <input type="number" id="set-pp-reflow" class="sec-in" min="0" max="100" step="1" /><span class="sec-u">页</span>
      </label>
      <label class="set-check">
        <input type="checkbox" id="set-pp-digest-on" />
        <span>预解读 前</span>
        <input type="number" id="set-pp-digest" class="sec-in" min="0" max="100" step="1" /><span class="sec-u">页（记忆A · 烧 token）</span>
      </label>
      <div id="pp-progress" class="pp-progress">未开始</div>
    </div>
    <div class="drawer-section">
      <label>上下文监控 · 最近推理（喂了什么 / 回了什么）</label>
      <div id="inspect-log"></div>
    </div>
    <div class="drawer-section">
      <div id="selftest">坐标自测：未运行</div>
    </div>
    <div class="drawer-section">
      <label>分段延迟（喂 I2 scorecard）</label>
      <table id="metrics-tbl">
        <thead><tr><th>段</th><th>最近</th><th>P50</th></tr></thead>
        <tbody id="metrics-body"></tbody>
      </table>
    </div>
    <div class="drawer-section grow">
      <label>Trace <button id="dl-trace" class="ghost mini">下载 JSONL</button></label>
      <div id="trace-log"></div>
    </div>
  </aside>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
