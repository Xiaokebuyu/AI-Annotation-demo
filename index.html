<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InkLoop · AI 标注阅读</title>
</head>
<body>
  <header id="topbar">
    <div class="brand">InkLoop</div>
    <div class="doc-meta">
      <span id="doc-name">未打开文档</span>
      <span id="page-ind"></span>
    </div>
    <div class="top-ctl">
      <button id="prev" class="ghost" title="上一页 ←">‹</button>
      <button id="next" class="ghost" title="下一页 →">›</button>
      <span class="vsep"></span>
      <button id="zoom-out" class="ghost" title="缩小">−</button>
      <span id="zoom-ind" class="zoom-ind">100%</span>
      <button id="zoom-in" class="ghost" title="放大">＋</button>
      <span class="vsep"></span>
      <label for="file-in" class="ghost import-label">导入 PDF</label>
      <input type="file" id="file-in" accept="application/pdf" hidden />
      <button id="load-chat" class="ghost" title="载入合成聊天 surface（验证 App-agnostic）">示例聊天</button>
      <button id="view-toggle" class="ghost" title="重排（AI 结构重建 · 保 bbox 可圈画）">重排</button>
      <button id="insight-toggle" class="ghost" title="本页洞察">洞察</button>
      <button id="dev-toggle" class="ghost" title="开发面板（d）">⋯</button>
    </div>
  </header>

  <main>
    <section id="reading">
      <div id="stage-wrap">
        <div id="stage">
          <canvas id="page-layer"></canvas>
          <canvas id="ink-layer"></canvas>
          <div id="whisper-layer"></div>
          <div id="empty-state">
            <div class="es-mark">✎</div>
            <p class="es-title">把 PDF 拖到这里，或点击导入</p>
            <p class="es-sub">在原文上圈、划、写 —— 每一次标注，都是一次思考的起点</p>
            <label for="file-in" class="primary-btn">导入 PDF</label>
          </div>
        </div>
      </div>
      <div id="reader" hidden></div>
      <nav id="toolbar" aria-label="标注工具"></nav>
    </section>

    <aside id="insight">
      <div class="panel-head">
        <span class="panel-title">本页洞察</span>
        <span id="insight-count" class="panel-count"></span>
      </div>
      <div id="cards"><p class="empty-hint">标注后，洞察会先在原文旁低语，并在此留存回看</p></div>
      <div id="panel-foot"></div>
    </aside>
  </main>

  <aside id="dev-drawer" hidden>
    <div class="drawer-head">
      <span>开发面板</span>
      <button id="drawer-close" class="ghost" title="返回阅读（按 d 切换）">← 返回阅读</button>
    </div>
    <div class="drawer-body">
    <div class="drawer-col settings-col">
    <div class="drawer-section">
      <label>调试控制</label>
      <label class="set-check">
        <input type="checkbox" id="set-gesture" />
        <span>手势响应（停笔后生成 HMP + 旁注）</span>
      </label>
      <label class="set-check">
        <span>停笔</span>
        <input type="number" id="set-pause-sec" class="sec-in" min="1" max="30" step="1" /><span class="sec-u">秒后生成</span>
      </label>
      <label class="set-check">
        <input type="checkbox" id="set-send-image" />
        <span>送合成图给模型（合成图<b>非</b>徐方案 · 默认关＝纯验证取证路线）</span>
      </label>
      <label class="set-check">
        <input type="checkbox" id="set-dev-overlay" />
        <span>显示 bbox 叠层（对象框 + 命中高亮 + 右上 HMP 浮窗 · 看精度）</span>
      </label>
      <div class="set-row">
        <span>推理模型</span>
        <select id="set-infer-model">
          <option value="kimi-k2.6">kimi-k2.6（默认 · 中文笔迹稳）</option>
          <option value="claude-opus-4-7">claude-opus-4-7（DMX · 质量·慢）</option>
          <option value="claude-opus-4-8">claude-opus-4-8（DMX · 最新）</option>
          <option value="claude-sonnet-4-6">claude-sonnet-4-6（DMX · 比 opus 快）</option>
          <option value="gemini-3.5-flash">gemini-3.5-flash（DMX）</option>
          <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite（DMX · 快）</option>
        </select>
      </div>
      <div id="selftest">坐标自测：未运行</div>
    </div>

    <div class="drawer-section">
      <details class="legacy-fold">
        <summary>功能开关（次要 · 不常用 · 已折叠保留）</summary>
        <div class="set-row">
          <span>输出落点</span>
          <select id="set-placement">
            <option value="margin">右侧留白</option>
            <option value="inline">贴正文浮动</option>
          </select>
        </div>
        <div class="set-row">
          <span>推理引擎</span>
          <select id="set-infer-engine">
            <option value="session">会话（主线 · 记得本书前文 · 跨标注连贯）</option>
            <option value="stateless">无状态（快速档 · 无跨标注记忆）</option>
          </select>
        </div>
        <label class="set-check">
          <input type="checkbox" id="set-thinking" />
          <span>思考链（仅 session · Claude 真开关）</span>
        </label>
        <div class="set-row">
          <span>手势判定</span>
          <select id="set-gesture-routing">
            <option value="auto">自动三档（主线）</option>
            <option value="geometric">只几何阈值（旧）</option>
            <option value="vlm">全程 VLM 视觉判定（旧·实验·烧 token）</option>
          </select>
        </div>
        <label class="set-check">
          <span>批注上下文</span>
          <input type="number" id="set-ctx-lines" class="sec-in" min="0" max="10" step="1" /><span class="sec-u">行</span>
        </label>
        <div class="set-row">
          <span>重排引擎</span>
          <select id="set-reflow">
            <option value="ai">AI 结构重建（主线 · 保 bbox）</option>
            <option value="local">仅启发式</option>
            <option value="hybrid">启发式 + 模型精修</option>
            <option value="vision">启发式 + 视觉重排</option>
            <option value="rewrite">VLM 看图重写</option>
          </select>
        </div>
        <div class="set-row">
          <span>重排模型（快 · 结构任务）</span>
          <select id="set-reflow-model">
            <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite（默认 · 快）</option>
            <option value="gemini-3.5-flash">gemini-3.5-flash（DMX）</option>
            <option value="kimi-k2.6">kimi-k2.6（慢 · 对照）</option>
            <option value="claude-sonnet-4-6">claude-sonnet-4-6（对照 · 准）</option>
          </select>
        </div>
        <label class="set-check">
          <input type="checkbox" id="set-textlayer" />
          <span>PDF 文本层（SurfaceIndex 源 · 数字版精确）</span>
        </label>
        <div class="set-row">
          <span>图像 OCR（旧 provider · 非主路径）</span>
          <select id="set-ocr-image">
            <option value="off">关闭</option>
            <option value="region">局部图</option>
            <option value="page">整页图</option>
          </select>
        </div>
        <label>推理 provider（无状态档 · mock/fail 可离线测）</label>
        <select id="infer-provider"></select>
        <label class="set-check">
          <input type="checkbox" id="set-pp-reflow-on" />
          <span>预排版 前</span>
          <input type="number" id="set-pp-reflow" class="sec-in" min="0" max="100" step="1" /><span class="sec-u">页</span>
        </label>
        <label class="set-check">
          <input type="checkbox" id="set-pp-digest-on" />
          <span>预解读 前</span>
          <input type="number" id="set-pp-digest" class="sec-in" min="0" max="100" step="1" /><span class="sec-u">页</span>
        </label>
        <div id="pp-progress" class="pp-progress">未开始</div>
        <table id="metrics-tbl">
          <thead><tr><th>段</th><th>最近</th><th>P50</th></tr></thead>
          <tbody id="metrics-body"></tbody>
        </table>
      </details>
    </div>
    </div><!-- /.settings-col -->

    <div class="drawer-col monitor-col">
    <div class="drawer-section">
      <label>取证记录 HMP · 徐智强序列语义方案（几何命中 / OCR兜底 / self_content / provenance）</label>
      <div id="surface-summary" class="surface-summary">surface：未初始化</div>
      <details class="legacy-fold"><summary>SurfaceIndex 对象表（step① 源头 · 核对采集准确性）</summary><div id="surface-objects"></div></details>
      <div id="hmp-log"></div>
    </div>
    <div class="drawer-section grow">
      <label>上下文监控 · 最近推理（喂了什么 / 看到什么图 / 回了什么）</label>
      <div id="inspect-log"></div>
    </div>
    <div class="drawer-section">
      <label>Trace <button id="dl-trace" class="ghost mini">下载 JSONL</button></label>
      <div id="trace-log"></div>
    </div>
    </div><!-- /.monitor-col -->
    </div><!-- /.drawer-body -->
  </aside>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
